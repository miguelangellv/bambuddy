name: Sync Upstream Release

on:
  schedule:
    # Comprobar cada hora si hay nueva release en upstream
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_tag:
        description: 'Forzar sync de un tag específico (ej: v1.2.0). Dejar vacío para detectar automáticamente.'
        required: false
        default: ''

env:
  # Sufijo único para tags/releases del fork — se usa en TODOS los pasos
  FORK_SUFFIX: autoamsslot
  CUSTOM_BRANCH: feature/auto-assign-spool-to-next-ams-slot
  UPSTREAM_REPO: maziggy/bambuddy
  DOCKER_IMAGE: ghcr.io/miguelangellv/bambuddy

permissions:
  contents: write
  packages: write

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    outputs:
      fork_tag: ${{ steps.upstream.outputs.fork_tag }}
      merge_branch: ${{ steps.merge.outputs.merge_branch }}
      released: ${{ steps.create_release.outputs.released }}
    steps:
      - name: Get latest upstream release
        id: upstream
        run: |
          if [ -n "${{ github.event.inputs.force_tag }}" ]; then
            TAG="${{ github.event.inputs.force_tag }}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "name=$TAG" >> "$GITHUB_OUTPUT"
            echo "fork_tag=${TAG}-${FORK_SUFFIX}" >> "$GITHUB_OUTPUT"
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          else
            RELEASE=$(curl -s "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest")
            TAG=$(echo "$RELEASE" | jq -r '.tag_name')
            NAME=$(echo "$RELEASE" | jq -r '.name')
            PRERELEASE=$(echo "$RELEASE" | jq -r '.prerelease')

            if [ "$PRERELEASE" = "true" ] || [ "$TAG" = "null" ]; then
              echo "No valid release found or is pre-release. Skipping."
              echo "new_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "name=$NAME" >> "$GITHUB_OUTPUT"
            echo "fork_tag=${TAG}-${FORK_SUFFIX}" >> "$GITHUB_OUTPUT"
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release already exists in fork
        if: steps.upstream.outputs.new_release == 'true'
        id: check_existing
        run: |
          FORK_TAG="${{ steps.upstream.outputs.fork_tag }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${FORK_TAG}")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Release ${FORK_TAG} already exists. Skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release ${FORK_TAG} does not exist. Proceeding."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout fork
        if: steps.upstream.outputs.new_release == 'true' && steps.check_existing.outputs.exists == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        if: steps.upstream.outputs.new_release == 'true' && steps.check_existing.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        if: steps.upstream.outputs.new_release == 'true' && steps.check_existing.outputs.exists == 'false'
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream --tags

      - name: Create merged branch from upstream tag + custom branch
        if: steps.upstream.outputs.new_release == 'true' && steps.check_existing.outputs.exists == 'false'
        id: merge
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          MERGE_BRANCH="release/${TAG}-${FORK_SUFFIX}"

          # Crear rama a partir del tag de upstream
          git checkout -b "$MERGE_BRANCH" "$TAG"

          # Hacer merge de la rama personalizada
          git fetch origin "$CUSTOM_BRANCH"
          if git merge "origin/$CUSTOM_BRANCH" --no-edit -m "Merge ${CUSTOM_BRANCH} into upstream ${TAG}"; then
            echo "merge_success=true" >> "$GITHUB_OUTPUT"
            echo "merge_branch=$MERGE_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Merge conflict detected. Manual intervention required."
            git merge --abort
            echo "merge_success=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Push merged branch
        if: steps.upstream.outputs.new_release == 'true' && steps.check_existing.outputs.exists == 'false' && steps.merge.outputs.merge_success == 'true'
        run: |
          git push origin "${{ steps.merge.outputs.merge_branch }}" --force

      - name: Create tag and release
        if: steps.upstream.outputs.new_release == 'true' && steps.check_existing.outputs.exists == 'false' && steps.merge.outputs.merge_success == 'true'
        id: create_release
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          FORK_TAG="${{ steps.upstream.outputs.fork_tag }}"
          UPSTREAM_NAME="${{ steps.upstream.outputs.name }}"
          MERGE_BRANCH="${{ steps.merge.outputs.merge_branch }}"

          # Eliminar tag local/remoto si existe de una ejecución fallida previa
          git tag -d "$FORK_TAG" 2>/dev/null || true
          git push origin ":refs/tags/$FORK_TAG" 2>/dev/null || true

          # Crear y pushear tag
          git tag "$FORK_TAG"
          git push origin "$FORK_TAG"

          # Crear release
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$(jq -n \
              --arg tag "$FORK_TAG" \
              --arg name "${UPSTREAM_NAME} (+ ${FORK_SUFFIX})" \
              --arg body "## Synced from upstream release \`${TAG}\`\n\nThis release is based on [upstream ${TAG}](https://github.com/${UPSTREAM_REPO}/releases/tag/${TAG}) with the \`${CUSTOM_BRANCH}\` branch merged on top.\n\n---\n\n**Branch:** \`${MERGE_BRANCH}\`\n**Upstream tag:** \`${TAG}\`\n**Docker image:** \`${DOCKER_IMAGE}:${FORK_TAG}\`" \
              --arg target "$MERGE_BRANCH" \
              '{tag_name: $tag, name: $name, body: $body, target_commitish: $target, draft: false, prerelease: false}'
            )")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Release $FORK_TAG created successfully!"
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Failed to create release (HTTP $HTTP_CODE): $BODY"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  build-and-push-docker:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-and-sync.outputs.fork_tag }}
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version for Docker tags
        id: meta
        run: |
          FORK_TAG="${{ needs.check-and-sync.outputs.fork_tag }}"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${DOCKER_IMAGE}:${FORK_TAG}" >> "$GITHUB_OUTPUT"
          echo "${DOCKER_IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Bambuddy fork with auto-assign-spool-to-next-ams-slot
            org.opencontainers.image.version=${{ needs.check-and-sync.outputs.fork_tag }}
